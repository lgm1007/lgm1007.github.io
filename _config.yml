baseurl: "" # the subpath of your site, e.g. /blog
url: "https://lgm1007.github.io" # the base hostname & protocol for your site, e.g. http://example.com

# Site Settings (for jekyll-seo-tag)
title: "규띵의 명한 기술블로그"
description: "백엔드 개발자 이규명의 기술 블로그입니다. Spring Boot, Java, Kotlin, Kafka, AWS 등 백엔드 기술에 대한 실무 경험과 학습 내용을 공유합니다."
author: "Gyumyung Lee"
lang: "ko"

# Build settings
markdown: kramdown
permalink: pretty
plugins:
  - jekyll-paginate
  - jekyll/tagging
  - jekyll-seo-tag

paginate: 10
paginate_path: "/page/:num"


# Pages Path
defaults:
  - scope:
      path: '_pages'
    values:
      permalink: /:basename:output_ext

include:
  - _pages


# Tags
tag_page_dir:         tag
tag_page_layout:      tag_page
tag_permalink_style:  pretty

sass:
  sass_dir: _sass
  style: compressed
